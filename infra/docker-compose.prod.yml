services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - smartvoucher-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - smartvoucher-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.llama
    restart: unless-stopped
    volumes:
      - ${LLAMA_MODEL_DIR}:/models:ro
    environment:
      MODEL_FILE: ${LLAMA_MODEL_FILE:-gemma-4-E2B-it-UD-Q4_K_XL.gguf}
      MMPROJ_FILE: ${LLAMA_MMPROJ_FILE:-mmproj-BF16.gguf}
      MODEL_ALIAS: ${LLAMA_MODEL_ALIAS:-gemma-4-E2B-it}
      NGL: ${LLAMA_NGL:-14}
      BATCH_SIZE: ${LLAMA_BATCH_SIZE:-512}
    networks:
      - smartvoucher-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    environment:
      LLAMA_SERVER_URL: http://llama-server:8080
    networks:
      - smartvoucher-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llama-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: ../webapp
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks:
      - smartvoucher-net
    depends_on:
      - api

  celery-worker:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    environment:
      LLAMA_SERVER_URL: http://llama-server:8080
    command: ["celery", "-A", "celery_app", "worker", "--concurrency=2", "-l", "info"]
    networks:
      - smartvoucher-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - smartvoucher-net
      - cloudflared-network
    depends_on:
      - api
      - webapp

volumes:
  postgres_data:
  redis_data:

networks:
  smartvoucher-net:
    driver: bridge
  cloudflared-network:
    external: true
    name: cloudflared-network
