# env-file relativo al directorio del repo (un nivel arriba de infra/)
# Correr siempre desde la raíz con el wrapper: infra/scripts/compose-prod.sh
# El build de Next.js ocurre dentro del Dockerfile.prod (multi-stage) — no se requiere build manual.
#
# ARQUITECTURA llama-server:
# llama-server corre NATIVO en el host (via llama.cpp/gemma-4-E2B-it.sh)
# La API lo accede via host-gateway (172.17.0.1:8080 o host.docker.internal:8080)
# Esto evita el problema de binarios compilados para host corriendo en contenedor.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - smartvoucher-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - smartvoucher-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    environment:
      # llama-server corre en el host — acceso via host-gateway
      LLAMA_SERVER_URL: http://host-gateway:8080
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - smartvoucher-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  webapp:
    build:
      context: ../webapp
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - smartvoucher-net
    depends_on:
      - api

  celery-worker:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ../.env
    environment:
      LLAMA_SERVER_URL: http://host-gateway:8080
    extra_hosts:
      - "host-gateway:host-gateway"
    command: ["python", "-m", "celery", "-A", "celery_app", "worker", "--concurrency=2", "-l", "info"]
    networks:
      - smartvoucher-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - smartvoucher-net
      - cloudflared-network
    depends_on:
      - api
      - webapp

volumes:
  postgres_data:
  redis_data:

networks:
  smartvoucher-net:
    driver: bridge
  cloudflared-network:
    name: cloudflared-network
    external: true
