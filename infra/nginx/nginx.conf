# Cloudflare real IP extraction
# Cloudflare IP ranges (IPv4) — update periodically from https://www.cloudflare.com/ips/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=300r/m;

# resolver apunta al DNS interno de Docker; valid=10s fuerza re-resolución
# para que al recrear contenedores nginx no quede con la IP vieja cacheada.
# IMPORTANTE: el resolver solo actúa cuando proxy_pass usa una variable ($upstream),
# no cuando usa un bloque upstream{} estático — por eso se usan variables abajo.
resolver 127.0.0.11 valid=10s ipv6=off;

# --- API: api.vantus.site ----------------------------------------------------
server {
    listen 80;
    server_name api.vantus.site;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health check (no rate limit)
    location /health {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream/health;
        proxy_set_header Host $host;
    }

    # All API traffic
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- Webapp: smartvoucher.vantus.site ----------------------------------------
server {
    listen 80;
    server_name smartvoucher.vantus.site;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Proxy /api/* → FastAPI backend (auth, uploads, etc.)
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Webapp Next.js
    location / {
        limit_req zone=web_limit burst=50 nodelay;
        set $webapp_upstream http://webapp:3000;
        proxy_pass $webapp_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
